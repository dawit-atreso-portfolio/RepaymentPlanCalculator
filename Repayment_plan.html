<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repayment Plan Calculator</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

</head>

<body class="bg-gray-50 text-gray-800 font-[Inter] flex justify-center">

<!-- ✅ CENTERED CONTAINER -->
<div class="w-full max-w-2xl">

<!-- 🔷 TITLE -->
<header class="text-center py-6">
  <h1 class="text-3xl font-bold text-blue-700 font-[Manrope]">
    Repayment Plan Calculator
  </h1>
</header>

<main class="px-6 pb-32">

<!-- 🔢 RESULT CARD -->
<section class="mb-10">
  <div class="bg-white rounded-3xl p-8 text-center shadow">
    
    <p class="text-sm uppercase tracking-widest text-gray-500 mb-2">
      Estimated Monthly Payment
    </p>

    <h2 id="resultAmount" class="text-5xl font-bold text-blue-600 mb-3">
      £0.00
    </h2>

    <div id="resultText"
      class="inline-block bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-medium">
      Based on plan
    </div>

  </div>
</section>

<!-- 📋 FORM -->
<section class="space-y-6">

<!-- Monthly Service Charge -->
<div>
  <label class="text-sm text-gray-500">Monthly Service Charge (£)</label>
  <input id="monthlyCharge" type="number" placeholder="0.00"
    class="w-full mt-2 p-4 rounded-xl bg-gray-100 text-lg">
</div>

<!-- Outstanding -->
<div>
  <label class="text-sm text-gray-500">Outstanding Service Charge (£)</label>
  <input id="outstandingCharge" type="number" placeholder="0.00"
    class="w-full mt-2 p-4 rounded-xl bg-gray-100 text-lg">
</div>

<!-- Shortfall -->
<div>
  <label class="text-sm text-gray-500">Housing Benefit Shortfall (£)</label>
  <input id="shortfall" type="number" placeholder="0.00"
    class="w-full mt-2 p-4 rounded-xl bg-gray-100 text-lg">
</div>

<!-- Period -->
<div class="grid grid-cols-2 gap-4">

  <div>
    <label class="text-sm text-gray-500">Repayment Period</label>
    <input id="period" type="number" placeholder="12"
      class="w-full mt-2 p-4 rounded-xl bg-gray-100 text-lg">
  </div>

  <div>
    <label class="text-sm text-gray-500">Frequency</label>

    <div class="flex bg-gray-200 rounded-xl p-1 mt-2">
      <button id="monthsBtn"
        class="flex-1 py-2 rounded-lg bg-blue-200 font-bold">
        Months
      </button>

      <button id="yearsBtn"
        class="flex-1 py-2 rounded-lg">
        Years
      </button>
    </div>

  </div>

</div>

<!-- BUTTON -->
<button onclick="calculateRepayment()"
  class="w-full bg-blue-600 text-white py-4 rounded-2xl text-lg font-bold mt-6">
  Calculate Plan
</button>

</section>

</main>
</div>

<!-- 🧠 SCRIPT -->
<script>
let periodType = "months";

const monthsBtn = document.getElementById("monthsBtn");
const yearsBtn = document.getElementById("yearsBtn");

monthsBtn.onclick = () => {
  periodType = "months";
  monthsBtn.classList.add("bg-blue-200");
  yearsBtn.classList.remove("bg-blue-200");
};

yearsBtn.onclick = () => {
  periodType = "years";
  yearsBtn.classList.add("bg-blue-200");
  monthsBtn.classList.remove("bg-blue-200");
};

function calculateRepayment() {

  let monthlyCharge = parseFloat(document.getElementById('monthlyCharge').value) || 0;
  let outstanding = parseFloat(document.getElementById('outstandingCharge').value) || 0;
  let shortfall = parseFloat(document.getElementById('shortfall').value) || 0;
  let period = parseFloat(document.getElementById('period').value) || 1;

  if (periodType === "years") {
    period = period * 12;
  }

  let totalArrears = outstanding + shortfall;
  let monthlyPayment = (totalArrears / period) + monthlyCharge;

  document.getElementById("resultAmount").innerText =
    "£" + monthlyPayment.toFixed(2);

  document.getElementById("resultText").innerText =
    "Based on a " + period + " month plan";
}
</script>

</body>
</html>
