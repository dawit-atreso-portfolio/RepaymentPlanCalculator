<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Service charge " />
<link rel="manifest" href="/site.webmanifest" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaver Balance Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

</head>

<body class="bg-gray-50 text-gray-800 font-[Inter] flex justify-center">

<div class="w-full max-w-2xl">

<header class="text-center py-6">
  <h1 class="text-3xl font-bold text-blue-700 font-[Manrope]">
    Leaver Balance Calculator
  </h1>
</header>

<main class="px-6 pb-32">

<!-- RESULT -->
<section class="mb-10">
  <div class="bg-white rounded-3xl p-8 text-center shadow">
    <p class="text-sm uppercase tracking-widest text-gray-500 mb-2">
      Estimated Balance
    </p>

    <h2 id="resultAmount" class="text-5xl font-bold text-blue-600 mb-3">
      £0.00
    </h2>

    <div id="resultText"
      class="inline-block bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-medium">
      Based on calculation
    </div>
  </div>
</section>

<!-- FORM -->
<section class="space-y-6">

<div>
  <label class="text-sm text-gray-500">Monthly Service Charge (£)</label>
  <input id="monthlyCharge" type="number" class="w-full mt-2 p-4 rounded-xl bg-gray-100">
</div>

<div>
  <label class="text-sm text-gray-500">Outstanding Balance (£)</label>
  <input id="outstanding" type="number" class="w-full mt-2 p-4 rounded-xl bg-gray-100">
</div>

<div>
  <label class="text-sm text-gray-500">Area</label>
  <select id="area" onchange="toggleInvoiceField()" class="w-full mt-2 p-4 rounded-xl bg-gray-100">
    <option value="Salford">Salford</option>
    <option value="Preston">Preston</option>
    <option value="Warrington">Warrington</option>
    <option value="Other">All Other Areas</option>
  </select>
</div>

<!-- Invoice Date (Preston only) -->
<div id="invoiceField" style="display:none;">
  <label class="text-sm text-gray-500">Invoice Day (Preston Only)</label>
  <input id="invoiceDay" type="number" min="1" max="31"
    class="w-full mt-2 p-4 rounded-xl bg-gray-100"
    placeholder="e.g. 5">
</div>

<div>
  <label class="text-sm text-gray-500">Move-In Date</label>
  <input id="moveInDate" type="date" class="w-full mt-2 p-4 rounded-xl bg-gray-100">
</div>

<div>
  <label class="text-sm text-gray-500">Move-Out Date</label>
  <input id="moveOutDate" type="date" class="w-full mt-2 p-4 rounded-xl bg-gray-100">
</div>

<button onclick="calculateLeaver()"
  class="w-full bg-blue-600 text-white py-4 rounded-2xl text-lg font-bold mt-6">
  Calculate Balance
</button>

</section>

</main>
</div>

<script>

// AREA RATES
const rates = {
  "Salford": 3.67,
  "Preston": 2.86,
  "Warrington": 3.65,
  "Other": 3.07
};

// SHOW/HIDE INVOICE FIELD
function toggleInvoiceField() {
  const area = document.getElementById('area').value;
  document.getElementById('invoiceField').style.display =
    area === "Preston" ? "block" : "none";
}

// DATE DIFFERENCE (inclusive)
function getDays(start, end) {
  let diff = (end - start) / (1000 * 60 * 60 * 24);
  return Math.max(0, Math.floor(diff) + 1);
}

function calculateLeaver() {

  let monthlyCharge = parseFloat(document.getElementById('monthlyCharge').value) || 0;
  let outstanding = parseFloat(document.getElementById('outstanding').value) || 0;
  let area = document.getElementById('area').value;
  let moveIn = document.getElementById('moveInDate').value;
  let moveOut = document.getElementById('moveOutDate').value;
  let invoiceDay = parseInt(document.getElementById('invoiceDay').value);

  if (!moveIn || !moveOut) {
    alert("Please enter valid dates");
    return;
  }

  let moveInDate = new Date(moveIn);
  let moveOutDate = new Date(moveOut);

  if (moveOutDate < moveInDate) {
    alert("Move-out date cannot be before move-in date");
    return;
  }

  let rate = rates[area];
  let startDate;

  // CASE A: SAME MONTH
  if (
    moveInDate.getMonth() === moveOutDate.getMonth() &&
    moveInDate.getFullYear() === moveOutDate.getFullYear()
  ) {
    startDate = moveInDate;

    let daysStayed = getDays(startDate, moveOutDate);
    let balance = daysStayed * rate;

    updateUI(balance, daysStayed, rate);
    return;
  }

  // CASE B
  if (area === "Preston") {

    if (!invoiceDay || invoiceDay < 1 || invoiceDay > 31) {
      alert("Enter valid invoice day for Preston");
      return;
    }

    let tempDate = new Date(moveOutDate);
    tempDate.setDate(invoiceDay);

    if (tempDate > moveOutDate) {
      tempDate.setMonth(tempDate.getMonth() - 1);
    }

    startDate = tempDate;

  } else {
    startDate = new Date(moveOutDate.getFullYear(), moveOutDate.getMonth(), 1);
  }

  let daysStayed = getDays(startDate, moveOutDate);

  let balance = outstanding - monthlyCharge + (daysStayed * rate);

  updateUI(balance, daysStayed, rate);
}

// UPDATE UI
function updateUI(balance, days, rate) {

  document.getElementById("resultAmount").innerText =
    "£" + balance.toFixed(2);

  document.getElementById("resultText").innerText =
    days + " days × £" + rate.toFixed(2);
}

</script>

</body>
</html>
