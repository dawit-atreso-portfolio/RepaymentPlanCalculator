<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Service charge " />
<link rel="manifest" href="/site.webmanifest" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move-In Payment Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

</head>

<body class="bg-gray-50 text-gray-800 font-[Inter] flex justify-center">

<div class="w-full max-w-2xl">

<!-- 🔷 TITLE -->
<header class="text-center py-6">
  <h1 class="text-3xl font-bold text-blue-700 font-[Manrope]">
    Move-In Payment Calculator
  </h1>
</header>

<main class="px-6 pb-32">

<!-- 🔢 RESULT -->
<section class="mb-10">
  <div class="bg-white rounded-3xl p-8 text-center shadow">
    
    <p class="text-sm uppercase tracking-widest text-gray-500 mb-2">
      Amount Payable
    </p>

    <h2 id="resultAmount" class="text-5xl font-bold text-blue-600 mb-3">
      £0.00
    </h2>

    <div id="resultText"
      class="inline-block bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-medium">
      Based on move-in date
    </div>

  </div>
</section>

<!-- 📋 FORM -->
<section class="space-y-6">

<!-- Area -->
<div>
  <label class="text-sm text-gray-500">Area of the Property</label>
  <select id="area"
    class="w-full mt-2 p-4 rounded-xl bg-gray-100 text-lg">
    <option value="0">Insert area</option>
    <option value="3.67">Salford</option>
    <option value="2.86">Preston</option>
    <option value="3.65">Warrington</option>
    <option value="3.07">All Other Areas</option>

  </select>
</div>

<!-- Move In Date -->
<div>
  <label class="text-sm text-gray-500">Move-In Date</label>
  <input id="moveInDate" type="date"
    class="w-full mt-2 p-4 rounded-xl bg-gray-100 text-lg">
</div>

<!-- BUTTON -->
<button onclick="calculateMoveIn()"
  class="w-full bg-blue-600 text-white py-4 rounded-2xl text-lg font-bold mt-6">
  Calculate Payment
</button>

</section>

</main>
</div>

<!-- 🧠 SCRIPT -->
<script>
function calculateMoveIn() {

  let areaRate = parseFloat(document.getElementById('area').value);
  let moveInDate = document.getElementById('moveInDate').value;

  if (!moveInDate) {
    alert("Please select a move-in date");
    return;
  }

  let date = new Date(moveInDate);

  let year = date.getFullYear();
  let month = date.getMonth();

  // Get last day of the month
  let lastDay = new Date(year, month + 1, 0).getDate();

  let moveInDay = date.getDate();

  // Days from move-in date to end of month (inclusive)
  let daysCharged = lastDay - moveInDay + 1;

  let total = daysCharged * areaRate;

  document.getElementById("resultAmount").innerText =
    "£" + total.toFixed(2);

  document.getElementById("resultText").innerText =
    daysCharged + " days charged at £" + areaRate.toFixed(2) + "/day";
}
</script>

</body>
</html>
